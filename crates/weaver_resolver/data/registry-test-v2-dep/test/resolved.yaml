file_format: resolved/2.0.0
schema_url: https://app.example.com/schemas/1.0.0
dependencies:
- schema_url: https://consumer.example.com/schemas/1.0.0
  registry_path: data/registry-test-v2-dep/consumer_published/resolved.yaml
- schema_url: https://server.example.com/schemas/1.0.0
  registry_path: data/registry-test-v2-dep/published/resolved.yaml
attribute_catalog:
- key: server.address
  type: string
  examples:
  - example.com
  brief: Server address.
  stability: stable
- key: server.port
  type: int
  examples:
  - 80
  - 443
  brief: Server port.
  stability: stable
- key: server.port
  type: int
  examples:
  - 80
  - 443
  brief: The server port used by the consumer.
  stability: stable
registry:
  attributes: []
  attribute_groups: []
  spans: []
  metrics:
  - name: consumer.request.count
    instrument: counter
    unit: '{request}'
    attributes:
    - base: 0
      requirement_level: required
    - base: 2
      requirement_level: recommended
    brief: App-level consumer request count.
    stability: stable
  - name: app.request.count
    instrument: counter
    unit: '{request}'
    attributes:
    - base: 0
      requirement_level: required
    - base: 1
      requirement_level: recommended
    brief: Count of app requests.
    stability: stable
  events: []
  entities: []
refinements:
  spans: []
  metrics:
  - id: consumer.request.count
    name: consumer.request.count
    instrument: counter
    unit: '{request}'
    attributes:
    - base: 0
      requirement_level: required
    - base: 2
      requirement_level: recommended
    brief: App-level consumer request count.
    stability: stable
  - id: app.request.count
    name: app.request.count
    instrument: counter
    unit: '{request}'
    attributes:
    - base: 0
      requirement_level: required
    - base: 1
      requirement_level: recommended
    brief: Count of app requests.
    stability: stable
  events: []
